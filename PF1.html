<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="PF1.JS"></script>
    <link rel="icon" type="image/png" sizes="80x80px" href="ROTA1.png">

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="ROTA360.png">ROTA360</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="PG1.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="PG3.html">Viagens</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="PG4.html">Compras</a>
                    </li>
                </ul>

                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Pesquise">
                    <button class="btn btn-outline-success" type="submit"
                        style="background-color: #01c08a; color: #fff;">
                        Saiba mais
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="row justify-content-center d-flex">

        <div class="col-sm-6">
            <img src="nova aorque.png" alt="" style="width: 800px; height: 650px;">
        </div>

        <div class="col-sm-6" style="background-color: rgb(208, 221, 219);">

            <div style="margin: 50px; margin-top: 100px;">
                <h3>Dados do Cliente</h3>

                <label style="margin-top: 20px; margin-bottom: 20px;" for="categoria">Escolha quantidade de
                    dias:</label>

                <select id="categoria">
                    <option value="">Dias</option>
                    <option value="um dia">1</option>
                    <option value="dois dias">2</option>
                    <option value="três dias">3</option>
                    <option value="quatro dias">4</option>
                    <option value="cinco dias">5</option>
                    <option value="seis dias">6</option>
                    <option value="Uma semana">Uma semana</option>
                    <option value="duas semanas">Duas semanas</option>
                    <option value="um mês">Um mês</option>
                </select>

                <div class="input-group mb-3">
                    <input type="text" id="email" class="form-control" placeholder="Digite seu E-MAIL">
                    <span class="input-group-text">@gmail.com</span>
                </div>


                <label>Nome</label>
                <input type="text" id="nome" class="form-control mb-2" placeholder="Digite o seu nome">

                <label>CPF</label>
                <input type="text" id="cpf" class="form-control mb-2" placeholder="Digite o seu CPF">

                <label>Telefone</label>
                <input type="text" id="telefone" class="form-control mb-3" placeholder="Digite seu telefone">

                <button onclick="salvarDados()" class="btn btn-success"
                    style="margin-top: 20px; background-color: #01c08a;">
                    Login
                </button>

            </div>
        </div>

    </div>


</body>

</html>
