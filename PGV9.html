<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>ROTA360</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="PGV9.js"></script>
    <link rel="icon" type="image/png" sizes="80x80px" href="ROTA1.png">

    <style>
        body {
            background-color: #f4f8fb;
        }

        .navbar {
            background-color: #e1b42d;
        }

        .btn-padrao {
            background-color: #e1b42d;
            color: white;
            border: none;
        }

        .btn-padrao:hover {
            background-color: #e1b42d;
        }

        .btn-carrossel {
            position: left;
            top: 55%;
            right: 5%;
            transform: translateY(-50%);
        }

        .resultado-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: #01c08a;
        }

        .card {
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand text-white" href="PG3.html">Gramado</a>
        </div>
    </nav>

    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active position-relative">
                <img src="gramado.png" class="d-block w-100" style="height: 500px; object-fit: cover;">

                <div class="btn-carrossel">
                    <a href="PG3.html" class="btn btn-padrao btn-lg px-5 py-3 shadow">
                        SAIBA MAIS
                    </a>
                </div>
            </div>

            <div class="carousel-item">
                <img src="gramado.png" class="d-block w-100" style="height: 500px; object-fit: cover;">
            </div>

        </div>
    </div>


    <section class="container mt-5 mb-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4" style="color:#00302b;">Calculadora de Viagem</h3>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Valor da Diária (R$)</label>
                    <input type="number" id="diaria" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Número de Dias</label>
                    <input type="number" id="dias" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Número de Pessoas</label>
                    <input type="number" id="pessoas" class="form-control">
                </div>
            </div>

            <div class="text-center mt-4">
                <button id="calcular" class="btn btn-padrao btn-lg shadow">
                    Calcular Valor
                </button>
            </div>

            <div class="mt-4">
                <label class="form-label">Resultado</label>
                <input type="text" id="resultado" class="form-control resultado-box" readonly>
            </div>
        </div>

</body>
