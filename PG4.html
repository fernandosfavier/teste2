<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>ROTA360</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="pg4.js"></script>
    <link rel="icon" type="image/png" sizes="80x80px" href="ROTA1.png">

    <style>
        body {
            background-color: #f4f8fb;
        }

        .navbar {
            background-color: #01c08a;
        }

        .btn-padrao {
            background-color: #01c08a;
            color: white;
            border: none;
        }

        .btn-padrao:hover {
            background-color: #01c08a;
        }

        .btn-carrossel {
            position: absolute;
            top: 55%;
            right: 5%;
            transform: translateY(-50%);
        }

        .resultado-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: #01c08a;
        }

        .card {
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand text-white" style="font-size: 20px;" href="PG3.html">Nova York</a>

        </div>
    </nav>


    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active position-relative">
                <img src="nova aorque.png" class="d-block w-100" style="height: 500px; object-fit: cover;">

                 <div class="btn-carrossel">
                    <a href="PF1.html" class="btn btn-padrao btn-lg px-5 py-3 shadow">
                        SAIBA MAIS
                    </a>
                </div>
            </div>

            <div class="carousel-item">
                <img src="nova aorque.png" class="d-block w-100" style="height: 500px; object-fit: cover;">
            </div>

        </div>
    </div>


    <section class="container mt-5 mb-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4" style="color:#00302b;">Calculadora de Viagem</h3>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Valor da Diária (R$)</label>
                    <input type="number" id="diaria" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Número de Dias</label>
                    <input type="number" id="dias" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Número de Pessoas</label>
                    <input type="number" id="pessoas" class="form-control">
                </div>
            </div>

            <div class="text-center mt-4">
                <button id="calcular" class="btn btn-padrao btn-lg shadow">
                    Calcular Valor
                </button>
            </div>

            <div class="mt-4">
                <label class="form-label">Resultado</label>
                <input type="text" id="resultado" class="form-control resultado-box" readonly>
            </div>
        </div>
    </div>
        <footer class="bg-light text-center text-lg-start row justify-content-center d-flex col-12 mt-4">


            <div class="col-sm-12 col-md-3 col-lg-3">
                <h5 class="text-uppercase">ROTA360</h5>
                <p>Onde os sonhos ganham asas!</p>
            </div>
            <div class="col-sm-12 col-md-3 col-lg-3">
                <h5 class="text-uppercase">Saiba mais!</h5>
                <ul class="list-unstyled">
                    <li><a href="PG2.html" class="text-dark">Sobre Nós</a></li>
                    <li><a href="PG3.html" class="text-dark">Compras</a></li>
                    <li><a href="#!" class="text-dark">Contato</a></li>

                </ul>
            </div>
            <div class="col-sm-12 col-md-3 col-lg-3">
                <h5 class="text-uppercase">Redes Sociais</h5>
                <a href="#" class="btn btn-outline-dark btn-floating m-1"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="btn btn-outline-dark btn-floating m-1"><i class="fab fa-twitter"></i></a>
                <a href="#" class="btn btn-outline-dark btn-floating m-1"><i class="fab fa-instagram"></i></a>
            </div>


            <div class="text-center col-12 p-3 bg-dark text-white">
                © 2026 ROTA360
            </div>
        </footer>

</body>
